<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Tarefas - To-Do App</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="todo-app">
      <main class="app-shell" id="appShell">
        <header class="app-header">
          <div>
            <p class="app-subtitle">Organize, priorize e finalize tarefas com um fluxo simples.</p>
            <h1 class="app-title">Lista de Tarefas</h1>
          </div>

          <button
            type="button"
            id="themeToggle"
            class="theme-toggle"
            aria-pressed="false"
            aria-label="Alternar tema"
          >
            <span aria-hidden="true">🌙</span>
          </button>
        </header>

        <section class="task-panel">
          <form id="taskForm" class="task-form" aria-label="Adicionar nova tarefa">
            <div class="form-grid">
              <div class="form-field">
                <label for="taskInput" class="visually-hidden">Descrição da tarefa</label>
                <input
                  id="taskInput"
                  class="input"
                  type="text"
                  autocomplete="off"
                  placeholder="Digite uma tarefa..."
                  aria-describedby="taskHelp"
                />
              </div>

              <div class="form-field">
                <label for="prioritySelect" class="visually-hidden">Prioridade</label>
                <select id="prioritySelect" class="select" aria-label="Selecionar prioridade">
                  <option value="high">Alta</option>
                  <option value="medium" selected>Média</option>
                  <option value="low">Baixa</option>
                </select>
              </div>
            </div>

            <div class="actions-row">
              <button type="submit" id="addTaskBtn" class="button button-primary">Adicionar</button>
              <p id="taskHelp" class="task-help">Pressione Enter para salvar a tarefa.</p>
            </div>

            <div class="actions-row actions-row--secondary" aria-label="Ações da lista">
              <button type="button" id="clearCompletedBtn" class="button button-ghost">Limpar concluídas</button>
            </div>
          </form>

          <div class="filters" role="tablist" aria-label="Filtros de tarefas"></div>
          <div class="task-status" aria-live="polite" aria-atomic="true">
            <p id="taskCount"></p>
          </div>
          <ul id="taskList" class="task-list" aria-label="Lista de tarefas"></ul>
        </section>
      </main>

      <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
