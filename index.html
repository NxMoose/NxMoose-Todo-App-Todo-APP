<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Tarefas - To-Do App</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Container principal da aplicação -->
    <div class="container">
      <!-- Título da aplicação -->
      <h1>To-Do List</h1>

      <!-- Botões de alternância de tema -->
      <button type="button" id="themeToggle" title="Alternar tema">🌙</button>

      <!-- Área de entrada de novas tarefas -->
      <div class="input-area">
        <select id="prioritySelect">
          <option value="high">Alta</option>
          <option value="medium" selected>Média</option>
          <option value="low">Baixa</option>
        </select>
        <input type="text" id="taskInput" placeholder="Digite uma tarefa..." />

        <button type="button" id="addTaskBtn">Adicionar</button>
      </div>

      <!-- Filtros para visualizar tarefas -->
      <div class="filters"></div>

      <!-- Lista de tarefas -->
      <ul id="taskList"></ul>

      <!-- Contador de tarefas restantes -->
      <p id="taskCount"></p>
    </div>

    <!-- Script da aplicação -->
    <script
  type="module"
  src="./js/app.js" 
></script>
  </body>
</html>
